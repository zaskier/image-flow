name: tests
on:
  pull_request:
    branches: [main]

jobs:
  get_services:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set_matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - id: set_matrix
        run: |
          echo "services=$(ls -d services/apps/*/ \
            | sed 's|services/apps/||;s/\/$//' \
            | jq -c -R -s 'split("\n") | map(select(length > 0))')" \
            >> $GITHUB_OUTPUT

  install_common:
    runs-on: ubuntu-latest
    container:
      image: node:24
    steps:
      - uses: actions/checkout@v4
      - name: Install Common dependencies
        working-directory: services/common
        run: npm install
      - name: Build Common package
        working-directory: services/common
        run: npm run build

  test_arch:
    needs: [get_services, install_common]
    runs-on: ubuntu-latest
    container:
      image: node:24
    strategy:
      matrix:
        service: ${{ fromJson(needs.get_services.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Common dependencies
        working-directory: services/common
        run: npm install

      - name: Install dependencies
        working-directory: services/apps/${{ matrix.service }}
        run: npm install

      - name: Architecture tests
        working-directory: services/apps/${{ matrix.service }}
        run: npm run test:arch

  test_cov:
    needs: [get_services, install_common]
    runs-on: ubuntu-latest
    container:
      image: node:24
    strategy:
      matrix:
        service: ${{ fromJson(needs.get_services.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Common dependencies
        working-directory: services/common
        run: npm install

      - name: Install dependencies
        working-directory: services/apps/${{ matrix.service }}
        run: npm install

      - name: Tests and coverage
        working-directory: services/apps/${{ matrix.service }}
        run: npm run test:cov
