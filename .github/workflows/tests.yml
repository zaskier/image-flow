name: tests
on:
  push:
    branches: [chore/tests]
  pull_request:
    branches: [main]

jobs:
  get_services:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set_matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - id: set_matrix
        run: |
          echo "services=$(ls -d services/apps/*/ \
            | sed 's|services/apps/||;s/\/$//' \
            | jq -c -R -s 'split("\n") | map(select(length > 0))')" \
            >> $GITHUB_OUTPUT

  install:
    needs: get_services
    runs-on: ubuntu-latest
    container:
      image: node:24
    strategy:
      matrix:
        service: ${{ fromJson(needs.get_services.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ matrix.service }}-${{ hashFiles(format('services/apps/{0}/package-lock.json', matrix.service)) }}
          restore-keys: npm-${{ matrix.service }}-

      - name: Install dependencies
        working-directory: services/apps/${{ matrix.service }}
        run: npm ci

  lint:
    needs: [get_services, install]
    runs-on: ubuntu-latest
    container:
      image: node:24
    strategy:
      matrix:
        service: ${{ fromJson(needs.get_services.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ matrix.service }}-${{ hashFiles(format('services/apps/{0}/package-lock.json', matrix.service)) }}
          restore-keys: npm-${{ matrix.service }}-

      - name: Install dependencies
        working-directory: services/apps/${{ matrix.service }}
        run: npm ci

      - name: Lint
        working-directory: services/apps/${{ matrix.service }}
        run: npm run lint

  test_arch:
    needs: [get_services, install]
    runs-on: ubuntu-latest
    container:
      image: node:24
    strategy:
      matrix:
        service: ${{ fromJson(needs.get_services.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ matrix.service }}-${{ hashFiles(format('services/apps/{0}/package-lock.json', matrix.service)) }}
          restore-keys: npm-${{ matrix.service }}-

      - name: Install dependencies
        working-directory: services/apps/${{ matrix.service }}
        run: npm ci

      - name: Architecture tests
        working-directory: services/apps/${{ matrix.service }}
        run: npm run test:arch

  test_cov:
    needs: [get_services, install]
    runs-on: ubuntu-latest
    container:
      image: node:24
    strategy:
      matrix:
        service: ${{ fromJson(needs.get_services.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ matrix.service }}-${{ hashFiles(format('services/apps/{0}/package-lock.json', matrix.service)) }}
          restore-keys: npm-${{ matrix.service }}-

      - name: Install dependencies
        working-directory: services/apps/${{ matrix.service }}
        run: npm ci

      - name: Tests and coverage
        working-directory: services/apps/${{ matrix.service }}
        run: npm run test:cov
