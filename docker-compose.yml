version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: image-flow-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: image_flow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: image-flow-storage
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: image-flow-mq
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  image-service:
    build:
      context: ./services/apps/image-service
      dockerfile: Dockerfile.dev
    container_name: image-flow-service
    ports:
      - "3000:3005"
    volumes:
      - ./services/apps/image-service:/usr/src/app
      - ./services/common:/usr/src/common
      - /usr/src/app/node_modules
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=user
      - DATABASE_PASSWORD=password
      - DATABASE_NAME=image_flow
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - minio
      - rabbitmq
      - redis

  processor-service:
    build:
      context: ./services/apps/processor-service
      dockerfile: Dockerfile.dev
    ports:
      - "3010-3015:3015"
    volumes:
      - ./services/apps/processor-service:/usr/src/app
      - ./services/common:/usr/src/common
      - /usr/src/app/node_modules
    environment:
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - IMAGE_SERVICE_URL=http://image-service:3005
    depends_on:
      - minio
      - rabbitmq

  minio-init:
    image: minio/mc
    container_name: image-flow-storage-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/images;
      /usr/bin/mc admin config set myminio notify_webhook:1 endpoint='http://processor-service:3015/webhooks/minio' queue_limit='0';
      /usr/bin/mc admin service restart myminio;
      /usr/bin/mc event add myminio/images arn:minio:sqs::1:webhook --event put;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
