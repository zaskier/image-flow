version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: image-flow-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: image_flow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: image-flow-storage
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  image-service:
    build:
      context: ./image-service
      dockerfile: Dockerfile.dev
    container_name: image-flow-service
    ports:
      - "3000:3000"
    volumes:
      - ./image-service:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=user
      - DATABASE_PASSWORD=password
      - DATABASE_NAME=image_flow
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      - postgres
      - minio

  processor-service:
    build:
      context: ./processor-service
      dockerfile: Dockerfile.dev
    container_name: image-flow-processor
    volumes:
      - ./processor-service:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      - minio

volumes:
  postgres_data:
  minio_data:
