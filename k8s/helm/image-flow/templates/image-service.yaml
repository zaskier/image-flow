apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.imageService.replicaCount }}
  selector:
    matchLabels:
      app: image-service
  template:
    metadata:
      labels:
        app: image-service
    spec:
      containers:
      - name: image-service
        image: "{{ .Values.imageService.image.repository }}:{{ .Values.imageService.image.tag }}"
        imagePullPolicy: {{ .Values.imageService.image.pullPolicy }}
        ports:
        - containerPort: 3005
        envFrom:
        - configMapRef:
            name: image-flow-config
        - secretRef:
            name: image-flow-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: image-service
  namespace: {{ .Release.Namespace }}
spec:
  type: LoadBalancer
  selector:
    app: image-service
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3005
